</html><!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Carros Simples</title>
    <style>
        /* Cores e visual do site */
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        /* Barra de pesquisa */
        .busca {
            padding: 10px;
            width: 80%;
            max-width: 400px;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
            font-size: 16px;
        }

        /* Grade onde ficam os carros */
        .grade {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        /* Cartão de cada carro */
        .cartao {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 10px;
            width: 280px;
            padding: 15px;
            text-align: left;
        }

        .cartao img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }

        .marca {
            color: #ff3333;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .nome {
            font-size: 20px;
            margin: 5px 0;
        }

        .info {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 10px;
        }

        /* Botão Curtir */
        .btn-curtir {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .btn-curtir.curtido {
            background-color: #ff3333;
        }
    </style>
</head>
<body>

    <h1>Garagem de Esportivos</h1>
    <p>Digite o nome do carro para filtrar a lista e clique em curtir!</p>

    <input type="text" id="campoBusca" class="busca" placeholder="Pesquise um carro...">

    <div id="listaCarros" class="grade"></div>

    <script>
        // Dados dos carros (Lista simples)
        const carros = [
            { nome: "911 GT3 RS", marca: "Porsche", potencia: "525 cv", imagem: "https://images.unsplash.com/photo-1718018314545-cfa97607fc54?w=400" },
            { nome: "Aventador SVJ", marca: "Lamborghini", potencia: "770 cv", imagem: "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?w=400" },
            { nome: "488 Pista", marca: "Ferrari", potencia: "720 cv", imagem: "https://images.unsplash.com/photo-1583121274602-3e2820c69888?w=400" },
            { nome: "720S Spider", marca: "McLaren", potencia: "720 cv", imagem: "https://images.unsplash.com/photo-1621135802920-133df287f89c?w=400" }
        ];

        const listaDiv = document.getElementById('listaCarros');
        const campoBusca = document.getElementById('campoBusca');

        // Função para mostrar os carros na tela
        function mostrarCarros(filtro = "") {
            listaDiv.innerHTML = ""; // Limpa a tela antes de desenhar

            carros.forEach(carro => {
                // Se o que o usuário digitou não bater com o nome ou marca, pula esse carro
                if (!carro.nome.toLowerCase().includes(filtro.toLowerCase()) && 
                    !carro.marca.toLowerCase().includes(filtro.toLowerCase())) {
                    return; 
                }

                // Cria o HTML do cartão do carro
                const cartao = document.createElement('div');
                cartao.className = 'cartao';
                cartao.innerHTML = `
                    <img src="${carro.imagem}" alt="${carro.nome}">
                    <div class="marca">${carro.marca}</div>
                    <div class="nome">${carro.nome}</div>
                    <div class="info">Potência: ${carro.potencia}</div>
                    <button class="btn-curtir" onclick="curtir(this)">Curtir ♥</button>
                `;
                
                listaDiv.appendChild(cartao);
            });
        }

        // Função interativa para mudar a cor do botão ao clicar
        function curtir(botao) {
            botao.classList.toggle('curtido');
            if (botao.classList.contains('curtido')) {
                botao.innerText = "Curtido! ♥";
            } else {
                botao.innerText = "Curtir ♥";
            }
        }

        // Detecta quando o usuário digita na busca
        campoBusca.addEventListener('input', () => {
            mostrarCarros(campoBusca.value);
        });

        // Mostra todos os carros assim que a página abre
        mostrarCarros();
    </script>
</body>
</html>
