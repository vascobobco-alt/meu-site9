<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem Suprema | Carros Esportivos</title>
    <style>
        /* Estilização Geral */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b0b;
            color: #fff;
        }

        header {
            background-color: #141414;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff003c;
        }

        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        header span {
            color: #ff003c;
        }

        /* Container dos Carros */
        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            padding: 40px 20px;
        }

        /* Cartão do Carro */
        .card {
            background-color: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            width: 300px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid #333;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(255, 0, 60, 0.3);
            border-color: #ff003c;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        .card-content h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card-content p {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .btn-som {
            background-color: #ff003c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-som:hover {
            background-color: #cc0030;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #141414;
            color: #666;
            font-size: 0.8rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Garagem <span>Suprema</span></h1>
    </header>

    <main class="container">
        <div class="card" onclick="tocarSom()">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=500" alt="Porsche Esportivo">
            <div class="card-content">
                <h3>Velocidade Pura</h3>
                <p>Sinta a potência do motor boxer de seis cilindros.</p>
                <button class="btn-som">Ouvir Motor 🔊</button>
            </div>
        </div>

        <div class="card" onclick="tocarSom()">
            <img src="https://images.unsplash.com/photo-1542282088-72c9c27ed0cd?w=500" alt="Audi Esportivo">
            <div class="card-content">
                <h3>Design Moderno</h3>
                <p>Tecnologia e performance agressiva nas pistas.</p>
                <button class="btn-som">Ouvir Motor 🔊</button>
            </div>
        </div>
    </main>

    <audio id="som-motor" src="https://www.soundjay.com/transportation/sounds/car-accelerating-01.mp3" preload="auto"></audio>

    <footer>
        <p>&copy; 2026 Garagem Suprema - Todos os direitos reservados.</p>
    </footer>

    <script>
        function tocarSom() {
            const som = document.getElementById('som-motor');
            
            // Reinicia o som caso ele já esteja tocando
            som.currentTime = 0;

            });
        }
    </script>
</body>
</html>
